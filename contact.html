            rel="stylesheet">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <!-- Nav Bar -->
        <nav class="navbar navbar-expand-md navbar-dark fixed-top">
            <div class="container-fluid">
                <!-- Navbar brand (Ev3) -->

                    Ev3 <i class="bi bi-moon-stars"></i>
                </a>
                <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Collapsible section -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="main.html"
                                onclick="resetToIntro">Home<i
                                    class="bi bi-dot"></i></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white"
                                href="personal.html">Personal<i
                                    class="bi bi-dot"></i></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white"
                                href="projects.html">Projects<i
                                    class="bi bi-dot"></i></a>
                        </li>

                                href="contact.html">Contact<i
                                    class="bi bi-dot"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <header class="container text-center mt-3 pt-5">
            <h1 id="contactHeader">Contact Me</h1>
        </header>

        <p class="prompt">I cannot wait to hear from you. Fill out the form
            below and I'll get back to you shortly.</p>

        <!-- Contact Form Section -->
        <div class="container mt-4" id="contactFORM">
            <form id="form" action="#" class="p-4 rounded">
                <div class="mb-3">
                    <label for="fname"
                        class="form-label text-white">Name</label>
                    <input type="text" id="fname" name="firstname"
                        class="form-control" placeholder="Enter your Name"
                        required>
                </div>
                <div class="mb-3">
                    <label for="fphone" class="form-label text-white">Phone
                        Number</label>
                    <input type="text" id="fphone" name="phoneNumber"
                        class="form-control"
                        placeholder="Enter your Phone Number" required>
                </div>

                <div class="mb-3">
                    <label for="lname" class="form-label text-white">Email
                        Address</label>
                    <input type="email" id="email" name="email"
                        class="form-control" placeholder="Enter Email" required>
                </div>

                <div class="mb-3">
                    <label for="subject"
                        class="form-label text-white">Message</label>
                    <textarea id="subject" name="subject" class="form-control"
                        placeholder="Type here..." style="height:200px"
                        required></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="btn btn-secondary">Submit</button>
            </form>
        </div>

        <!-- Footer-->
        <footer>
            <!-- Social Media Links -->
            <div class="social-media py-5 text-center">
                <a
                    href="https://www.instagram.com/_0dd.x/profilecard/?igsh=MTViY3hnd3hxNmsydQ=="
                    target="_blank" class="social-icon">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="https://youtube.com/@0ddpsycho?si=BnZ9A3rf6ER9Pneb"
                    target="_blank" class="social-icon">
                    <i class="bi bi-youtube"></i>
                </a>
                <a href="https://github.com/0ddev3" target="_blank"
                    class="social-icon">
                    <i class="bi bi-github"></i>
                </a>
                <a
                    href="https://www.facebook.com/share/1GqG9V3Fnf/?mibextid=LQQJ4d"
                    target="_blank" class="social-icon">
                    <i class="bi bi-facebook"></i>
                </a>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
        <script src="code.js"></script>
    </body>
</html>
